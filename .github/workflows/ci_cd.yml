name: Build and Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      DOCKER_HUB_REPO: sbika/juridika

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Free Disk Space
        run: |
          echo "Initial space:"
          df -h
          docker image prune -af || true
          docker builder prune -af || true
          echo "After cleanup:"
          df -h

      - name: Build and Push Docker Images
        run: |
          COMMIT_HASH=${{ github.sha }}
          services=("frontend" "backend")
          for svc in "${services[@]}"; do
            echo "Building and pushing $svc..."

            # Définir le chemin du Dockerfile et du context
            if [ "$svc" == "frontend" ]; then
              DOCKERFILE_PATH="./frontend/Dockerfile"
              CONTEXT_PATH="./frontend"
            else
              DOCKERFILE_PATH="./backend/Dockerfile"
              CONTEXT_PATH="./backend"
            fi

            # Builder et tagger
            docker build -f $DOCKERFILE_PATH -t $DOCKER_HUB_REPO:$svc -t $DOCKER_HUB_REPO:$svc-$COMMIT_HASH $CONTEXT_PATH

            # Pousser les deux tags
            docker push $DOCKER_HUB_REPO:$svc
            docker push $DOCKER_HUB_REPO:$svc-$COMMIT_HASH
          done

      - name: Final Cleanup
        run: |
          docker system prune -af || true
          docker volume prune -f || true
          echo "Final space:"
          df -h
